# cc-connect QQ config via NapCat / OneBot v11.
# Copy to configs/cc-connect.napcat.local.toml and adjust ws_url/token/allow_from.

language = "zh"
data_dir = "C:\\chatbot-qq\\.cc-connect"

[log]
level = "info"

[display]
mode = "compact"
thinking_messages = false
tool_messages = false
show_context_indicator = false
reply_footer = false

[stream_preview]
enabled = false

[instant_reply]
enabled = false
content = ""

[rate_limit]
max_messages = 20
window_secs = 60

[[projects]]
name = "qq-admin-root-100000001"
reset_on_idle_mins = 30

[projects.agent]
type = "codex"

[projects.agent.options]
work_dir = "C:\\chatbot-qq"
mode = "full-auto"
model = "gpt-5.5"
reasoning_effort = "high"

[[projects.platforms]]
type = "qq"

[projects.platforms.options]
ws_url = "ws://127.0.0.1:3011"
token = ""
allow_from = "100000001"
share_session_in_channel = false

