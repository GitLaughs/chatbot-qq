# Server cc-connect config for the official QQ Bot platform.
# This path does not need NapCat, Node, or public inbound ports.

language = "zh"
data_dir = "/opt/chatbot-qq/.cc-connect"

[log]
level = "info"

[display]
mode = "compact"
thinking_messages = false
tool_messages = true

[stream_preview]
enabled = false

[rate_limit]
max_messages = 20
window_secs = 60

[[projects]]
name = "qqbot-main"
reset_on_idle_mins = 30

[projects.agent]
type = "codex"

[projects.agent.options]
work_dir = "/opt/chatbot-qq/groups/default"
mode = "full-auto"
model = "gpt-5.4-mini"
reasoning_effort = "medium"

[[projects.platforms]]
type = "qqbot"

[projects.platforms.options]
app_id = "${QQBOT_APP_ID}"
app_secret = "${QQBOT_APP_SECRET}"
sandbox = true
allow_from = "*"
share_session_in_channel = false
markdown_support = false
